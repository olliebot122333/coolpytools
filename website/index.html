<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CoolPyTools</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #202124;
            color: white;
            text-align: center;
        }

        header {
            padding: 80px 20px;
            background: #303134;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 22px;
            color: #bbbbbb;
        }

        .button {
            display: inline-block;
            margin: 25px 10px;
            padding: 15px 25px;
            background: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }

        .button:hover {
            background: #66bb6a;
        }

        .tools {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 50px 20px;
        }

        .tool {
            background: #303134;
            padding: 25px;
            width: 220px;
            border-radius: 12px;
        }

        .tool h2 {
            margin-top: 0;
        }

        footer {
            padding: 30px;
            color: #aaaaaa;
        }

    </style>
</head>

<body>

    <header>

        <h1>CoolPyTools</h1>

        <p class="subtitle">
            A collection of Python tools made for Raspberry Pi
        </p>

        <a
            class="button"
            href="https://github.com/olliebot122333/coolpytools"
        >
            View on GitHub
        </a>

    </header>


    <section class="tools">

        <div class="tool">

            <h2>🧮 Calculator</h2>

            <p>
                A simple Python calculator tool.
            </p>

        </div>


        <div class="tool">

            <h2>📝 Text Editor</h2>

            <p>
                Create, open, edit, and save text files.
            </p>

        </div>


        <div class="tool">

            <h2>🧱 Minecraft Pi IDE</h2>

            <p>
                Create and run Python scripts for Minecraft Pi.
            </p>

        </div>

    </section>


    <footer>

        Created by Oliver Morandi

    </footer>

</body>

</html>
